<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password - Vintage party</title>
    <link rel="icon" type="image" href="img/log.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lemon&family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/css.css">
</head>

<body>
    <header>
        <div class="header">
            <div class="logo">
                <img class="imgLogo" src="img/log.png" alt="Logo">
                <h1>Vintage Party</h1>
            </div>
        </div>
    </header>
    <div class="fondo">
        <div class="imgIlustration">
            <div class="imgIlus">
                <img class="ilus" src="img/Illustration.png" alt="ilustration">
                <div class="spans">
                    <span class="one"></span>
                    <span class="two"></span>
                    <span class="three"></span>
                </div>
            </div>
        </div>
        <div class="form recoverpassword">
            <div class="titles">
                <h2>Welcome</h2>
                <h3>Recover your password</h3>
            </div>
            <div class="inputs-all">
                <div class="input-wrapper">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Job Isai">
                </div>
                <div class="input-wrapper">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="joh@nomail.com">
                </div>
            </div>
        
            <div class="continue getCode">
                <button class="continue-btn codePassword">Get Code</button>
            </div>
           
             <div class="input-wrapper">
                    <label for="code">Code</label>
                    <input class="password-input" type="password" id="code" placeholder="*********">
                    <img class="eye-password" src="img/eye.svg" alt="eye">
                </div>


             <div class="continue getCode">
                 <button class="continue-btn codePassword">Log in</button>
            </div>
           
            <div class="donthaveaccount">
                <span>Dont't have an account? <a href="createaccount.html">Create account</a></span>
            </div>
        </div>

    </div>
    <div class="footer">
        <div class="footerContent">
            <span>Copyright 2021 - vintage2026. All rights Reserved</span>
            <div class="needhelp">
                <img src="img/Shape.svg" alt="Need help icon">
                <a href="#">You need Help?</a>
            </div>
        </div>
    </div>


</body>

</html>
