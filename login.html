<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoginVintage</title>
    <link rel="icon" type="image" href="img/log.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lemon&family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/css.css">
</head>

<body>
    <header>
        <div class="header">
            <div class="logo">
                <img class="imgLogo" src="img/log.png" alt="Logo">
                <h1>Vintage Party</h1>
            </div>
        </div>
    </header>
    <div class="fondo">
        <div class="imgIlustration">
            <div class="imgIlus">
                <img class="ilus" src="img/Illustration.png" alt="ilustration">
                <div class="spans">
                    <span class="one"></span>
                    <span class="two"></span>
                    <span class="three"></span>
                </div>
            </div>
        </div>
        <div class="form">
            <div class="titles">
                <h2>Welcome</h2>
                <h3>Log in to your account</h3>
            </div>
            <div class="inputs-all">
                <div class="input-wrapper">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="joh@nomail.com">
                </div>
                <div class="input-wrapper">
                    <label for="Password">Password</label>
                    <input class="password-input" type="password" id="Password" placeholder="*********">
                    <img class="eye-password" src="img/eye.svg" alt="eye">
                </div>
            </div>
            <div class="remenber forget">
                <div class="remenber-check">
                    <input class="checkbox" type="checkbox" id="remenber">
                    <label for="remenber">Remember me</label>
                </div>
                <div class="forgetPassword">
                    <a href="recoverPassword.html">Forgot Password?</a>
                </div>
            </div>
            <div class="continue">
                <button class="continue-btn">Continue</button>
            </div>
            <div class="spanforline">
                <span class="line"></span>
                <span class="or">Or</span>
                <span class="line"></span>
            </div>

            <div class="google">
                <div class="continueWithGoogle">
                    <img class="imgGoogle" src="img/icons8-google.svg" alt="iconGoogle">
                    <span>Continue with Google</span>
                </div>
            </div>
            <div class="facebook">
                <div class="continueWithFacebook">
                    <img class="imgFacebook" src="img/icons8-facebook.svg" alt="iconFacebook">
                    <span>Continue with Facebook</span>
                </div>
            </div>
            <div class="apple">
                <div class="continueWithApple">
                    <img class="imgApple" src="img/apple.svg" alt="iconApple">
                    <span>Continue with Apple</span>
                </div>
            </div>
            <div class="donthaveaccount">
                <span>Dont't have an account? <a href="createaccount.html">Create account</a></span>
            </div>
        </div>

    </div>
    <div class="footer">
        <div class="footerContent">
            <span>Copyright 2021 - vintage2026. All rights Reserved</span>
            <div class="needhelp">
                <img src="img/Shape.svg" alt="Need help icon">
                <a href="#">You need Help?</a>
            </div>
        </div>
    </div>


</body>

</html>
